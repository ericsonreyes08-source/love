<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>
<style>
body {
  margin:0; padding:0; font-family: Arial; overflow:hidden;
  background: linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
  background-size:400% 400%; animation: gradientBG 10s ease infinite;
  text-align:center;
}
@keyframes gradientBG {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container { position:relative; top:35vh; }
h1 { color:white; font-size:28px; text-shadow:0 0 15px rgba(255,255,255,0.8);}
button {
  padding:15px 35px; font-size:20px; border:none; border-radius:40px;
  margin:20px; cursor:pointer; position:absolute; transition:0.2s; user-select:none;
}
#yesBtn {background:#ff4d6d; color:white; left:25%; width:120px; height:50px; box-shadow:0 0 20px #ff4d6d;}
.noBtn {background:#222; color:white; left:60%; top:50px; width:120px; height:50px;}
.heart {position:absolute; bottom:-50px; font-size:24px; animation:floatUp 6s linear infinite;}
@keyframes floatUp {0%{transform:translateY(0);opacity:1}100%{transform:translateY(-110vh);opacity:0}}
.firework {position:absolute; font-size:30px; animation:explode 1s ease-out forwards;}
@keyframes explode {0%{transform:scale(0.5);opacity:1}100%{transform:scale(2);opacity:0}}
#startOverlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background:black; color:white; display:flex; justify-content:center; align-items:center;
  font-size:24px; z-index:999; flex-direction:column;
}
</style>
</head>
<body>

<div id="startOverlay">Tap Anywhere to Start 💖</div>

<audio id="bgMusic" loop>
  <source src="once-in-a-lifetime.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1 id="question"></h1>
  <button id="yesBtn">YES 💖</button>
  <button class="noBtn">NO 😢</button>
</div>

<script>
const herName = "Love";
document.getElementById("question").innerHTML = `Can we be together again, ${herName}? 💕`;

const yesBtn = document.getElementById("yesBtn");
const container = document.querySelector(".container");
const bgMusic = document.getElementById("bgMusic");
const startOverlay = document.getElementById("startOverlay");

let noClickCount = 0;

// Play music after first interaction
function startEverything(){
  bgMusic.play().catch(()=>{});
  startOverlay.style.display = "none";
}
startOverlay.addEventListener("click", startEverything);
startOverlay.addEventListener("touchstart", startEverything);

// Floating hearts
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+20)+"px";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);

// Fireworks
function launchFireworks(){
  for(let i=0;i<30;i++){
    const fw=document.createElement("div");
    fw.classList.add("firework");
    fw.innerHTML="🎆";
    fw.style.left=Math.random()*100+"vw";
    fw.style.top=Math.random()*100+"vh";
    document.body.appendChild(fw);
    setTimeout(()=>fw.remove(),1000);
  }
}

// YES button click
yesBtn.addEventListener("click",()=>{
  document.body.innerHTML=`<div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;background:black;color:white;flex-direction:column;">
    <h1 style="font-size:45px;color:#ff4d6d;">YESSSS 💖</h1>
    <p style="font-size:26px;">
      Thank you, ${herName}. <br>
      I love you lovelove. <br>
      I know you love me too ❤️
    </p>
  </div>`;
  launchFireworks();
});

// NO button behavior
function moveNo(noBtn){
  noClickCount++;
  const padding = 20;
  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;
  const x = Math.random()*maxX;
  const y = Math.random()*maxY;
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
  noBtn.style.transform = `scale(${Math.max(0.8,1 - noClickCount*0.05)})`;

  // Add clone after small delay to avoid touchscreen glitches
  if(noClickCount <=3){
    setTimeout(()=>{
      const clone = noBtn.cloneNode(true);
      clone.innerText = noClickCount===1 ? "Are you sure? 😳" : noClickCount===2 ? "Really?? 😭" : "Think again 😏";
      clone.style.left = Math.random()*maxX + "px";
      clone.style.top = Math.random()*maxY + "px";
      container.appendChild(clone);
      clone.addEventListener("mouseenter",()=>moveNo(clone));
      clone.addEventListener("touchstart",e=>{e.preventDefault(); moveNo(clone);});
    },50);
  }
}

const initialNo = document.querySelector(".noBtn");
initialNo.addEventListener("mouseenter",()=>moveNo(initialNo));
initialNo.addEventListener("touchstart", e=>{e.preventDefault(); moveNo(initialNo);});
</script>

</body>
</html>
